services:
  signature-coordinator:
    build: .
    container_name: signature_ai_agent
    ports:
      - "7860:7860"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    # Persistence: This ensures saved reports don't vanish if the container stops
    volumes:
      - signature_storage:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  signature_storage: